name: "HCL AppScan SAST for ASoC EU Instance"
on:
  workflow_dispatch:

  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Run AppScan SAST scan
        uses: HCL-TECH-SOFTWARE/appscan-sast-action@ASA-13165_GitHub_PR_Scan_Summary
        with:
          asoc_key: ${{secrets.ASOC_KEY}}
          asoc_secret: ${{secrets.ASOC_SECRET}}
          application_id: 4b489cb2-ae9f-4aea-8079-9e37099ce87a
          service_url: https://eu.cloud.appscan.com 
          wait_for_analysis: true
                   
      # Upload PR HTML report
      - name: Upload PR report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: appscan-pr-report
          path: | 
            Report_*.html
          if-no-files-found: ignore

      # Upload build summary HTML report
      - name: Upload Build report
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: appscan-build-report
          path: | 
             Report_*.html
          if-no-files-found: ignore
