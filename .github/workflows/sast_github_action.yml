name: "HCL AppScan SAST"
on:
  workflow_dispatch:

  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Run AppScan SAST scan
        uses: HCL-TECH-SOFTWARE/appscan-sast-action@ASA-13165
        with:
          asoc_key: ${{secrets.ASOC_KEY}}
          asoc_secret: ${{secrets.ASOC_SECRET}}
          application_id: 21b194f5-cea5-4ff6-a4d1-a03103a3e2fb
          static_analysis_only: true
          wait_for_analysis: true
                   
      # Upload PR HTML report
      - name: Upload PR report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: appscan-pr-report
          path: appscan-pr-report.html

      # Upload build summary HTML report
      - name: Upload Build report
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: appscan-build-report
          path: appscan-build-summary-report.html
